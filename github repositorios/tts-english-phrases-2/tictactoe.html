<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 3px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #scoreboard {
      display: flex;
      gap: 2rem;
      margin: 1.5rem 0 1rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 0.5rem 1.2rem;
    }

    .score-box .label { color: #888; font-size: 0.8rem; margin-bottom: 4px; }
    .score-box .value { font-size: 1.6rem; font-weight: bold; }
    .score-box.x-score .value { color: #e94560; }
    .score-box.o-score .value { color: #a8dadc; }
    .score-box.draw-score .value { color: #aaa; }

    #mode-toggle {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    button {
      padding: 0.5rem 1.2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: bold;
      transition: opacity 0.2s;
    }

    .mode-btn {
      background: #16213e;
      color: #aaa;
      border: 1px solid #0f3460;
    }

    .mode-btn.active {
      background: #0f3460;
      color: #fff;
      border-color: #e94560;
    }

    #restart-btn {
      margin-top: 1.2rem;
      background: #e94560;
      color: #fff;
      padding: 0.6rem 2rem;
      font-size: 1rem;
    }

    #restart-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>

  <div id="mode-toggle">
    <button class="mode-btn active" id="btn-pvp" onclick="setMode('pvp')">2 Players</button>
    <button class="mode-btn" id="btn-ai" onclick="setMode('ai')">vs CPU</button>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" onclick="play(0)"></div>
    <div class="cell" onclick="play(1)"></div>
    <div class="cell" onclick="play(2)"></div>
    <div class="cell" onclick="play(3)"></div>
    <div class="cell" onclick="play(4)"></div>
    <div class="cell" onclick="play(5)"></div>
    <div class="cell" onclick="play(6)"></div>
    <div class="cell" onclick="play(7)"></div>
    <div class="cell" onclick="play(8)"></div>
  </div>

  <div id="scoreboard">
    <div class="score-box x-score">
      <div class="label">X</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box draw-score">
      <div class="label">DRAW</div>
      <div class="value" id="score-d">0</div>
    </div>
    <div class="score-box o-score">
      <div class="label">O</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <button id="restart-btn" onclick="restart()">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    let board, current, gameOver, mode, scores;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      scores = scores || { X: 0, O: 0, D: 0 };
      mode = mode || 'pvp';
      render();
      setStatus(`Player X's turn`);
    }

    function setMode(m) {
      mode = m;
      document.getElementById('btn-pvp').classList.toggle('active', m === 'pvp');
      document.getElementById('btn-ai').classList.toggle('active', m === 'ai');
      restart();
    }

    function play(i) {
      if (gameOver || board[i]) return;
      board[i] = current;
      render();
      const result = checkWin();
      if (result) return end(result);
      current = current === 'X' ? 'O' : 'X';
      setStatus(`Player ${current}'s turn`);
      if (mode === 'ai' && current === 'O' && !gameOver) {
        setTimeout(aiMove, 350);
      }
    }

    function aiMove() {
      const move = bestMove();
      if (move !== -1) play(move);
    }

    function bestMove() {
      // Try to win
      for (let i = 0; i < 9; i++) {
        if (!board[i]) { board[i] = 'O'; if (checkWin()) { board[i] = null; return i; } board[i] = null; }
      }
      // Block X from winning
      for (let i = 0; i < 9; i++) {
        if (!board[i]) { board[i] = 'X'; if (checkWin()) { board[i] = null; return i; } board[i] = null; }
      }
      // Take center
      if (!board[4]) return 4;
      // Take corner
      const corners = [0, 2, 6, 8].filter(i => !board[i]);
      if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
      // Take any
      const free = board.map((v, i) => v ? null : i).filter(v => v !== null);
      return free.length ? free[Math.floor(Math.random() * free.length)] : -1;
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[b] === board[c]) return [a, b, c];
      }
      if (board.every(Boolean)) return 'draw';
      return null;
    }

    function end(result) {
      gameOver = true;
      if (result === 'draw') {
        setStatus("It's a draw!");
        scores.D++;
      } else {
        setStatus(`Player ${current} wins!`);
        result.forEach(i => document.querySelectorAll('.cell')[i].classList.add('win'));
        scores[current]++;
      }
      updateScores();
    }

    function render() {
      document.querySelectorAll('.cell').forEach((cell, i) => {
        cell.textContent = board[i] || '';
        cell.className = 'cell' + (board[i] ? ` ${board[i].toLowerCase()} taken` : '');
      });
    }

    function updateScores() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-d').textContent = scores.D;
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function restart() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      render();
      setStatus(`Player X's turn`);
    }

    init();
  </script>
</body>
</html>
