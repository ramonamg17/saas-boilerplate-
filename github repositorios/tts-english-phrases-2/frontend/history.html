<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History – LinguaFlow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e40;
      --accent: #6c63ff;
      --accent-hover: #7d75ff;
      --accent-dim: rgba(108, 99, 255, 0.15);
      --text: #e8e8f0;
      --text-muted: #8888a8;
      --success: #4caf88;
      --error: #ef5350;
      --radius: 12px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    nav {
      width: 100%;
      max-width: 520px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    nav .logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.85rem;
    }

    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 20px;
      width: 100%;
      max-width: 520px;
    }

    .session-list {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      transition: border-color 0.15s;
    }

    .session-card:hover {
      border-color: var(--accent);
    }

    .card-summary {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .session-info { flex: 1; min-width: 0; }

    .session-topic {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .session-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .session-time {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .play-btn {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--accent);
      cursor: pointer;
      padding: 0;
      transition: background 0.15s;
    }

    .play-btn:hover { background: rgba(108,99,255,0.3); }

    .play-btn svg {
      width: 16px;
      height: 16px;
      fill: var(--accent);
      pointer-events: none;
    }

    .download-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 5px 8px;
      text-decoration: none;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }
    .download-btn:hover { color: var(--text); border-color: var(--accent); }

    .player-panel {
      width: 100%;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
      padding: 0;
    }
    .player-panel.open {
      max-height: 120px;
      padding-top: 12px;
    }

    .mini-seek-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .mini-seek {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
      height: 4px;
    }
    .mini-time {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 90px;
      text-align: right;
    }

    .mini-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .skip-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 3px 8px;
      font-family: var(--font);
      transition: color 0.15s, border-color 0.15s;
    }
    .skip-btn:hover { color: var(--text); border-color: var(--accent); }

    .delete-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .delete-btn:hover { color: var(--error); background: rgba(239,83,80,0.1); }

    .session-card.deleting {
      filter: blur(2px);
      opacity: 0.4;
      pointer-events: none;
      transition: filter 0.2s, opacity 0.2s;
    }

    .session-card.deleted {
      opacity: 0;
      max-height: 0;
      padding: 0;
      margin: 0;
      overflow: hidden;
      transition: opacity 0.3s, max-height 0.4s 0.25s, padding 0.4s 0.25s, margin 0.4s 0.25s;
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state p { font-size: 0.95rem; line-height: 1.6; }
    .empty-state a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .error-msg {
      background: rgba(239, 83, 80, 0.1);
      border: 1px solid var(--error);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 0.875rem;
      color: var(--error);
      width: 100%;
      max-width: 520px;
      margin-bottom: 16px;
    }

    .spinner-wrap {
      display: flex;
      justify-content: center;
      padding: 48px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .new-session-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .new-session-btn:hover { background: var(--accent-hover); }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="/">LinguaFlow</a>
    <div class="nav-right">
      <a href="history.html" style="color:var(--text);font-weight:600;text-decoration:none;font-size:0.85rem">History</a>
      <a href="settings.html" style="color:var(--text-muted);text-decoration:none;font-size:0.85rem">Settings</a>
      <a href="billing.html" style="color:var(--text-muted);text-decoration:none;font-size:0.85rem">Plan</a>
      <a href="settings.html" style="color:var(--text-muted);text-decoration:none;font-size:0.85rem" id="user-email"></a>
    </div>
  </nav>

  <a href="/app" style="width:100%;max-width:520px;display:inline-block;margin-bottom:12px;font-size:0.85rem;color:var(--text-muted);text-decoration:none;">← Back to app</a>

  <h2>Your recordings</h2>

  <div id="main-content" class="session-list">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>

  <script>
    const API_URL = window.location.origin;

    function relativeTime(isoString) {
      const diff = Math.floor((Date.now() - new Date(isoString).getTime()) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) { const m = Math.floor(diff / 60); return `${m} minute${m > 1 ? 's' : ''} ago`; }
      if (diff < 86400) { const h = Math.floor(diff / 3600); return `${h} hour${h > 1 ? 's' : ''} ago`; }
      if (diff < 604800) { const d = Math.floor(diff / 86400); return `${d} day${d > 1 ? 's' : ''} ago`; }
      return new Date(isoString).toLocaleDateString('pt-BR');
    }

    function markPlayed(sessionId) {
      const token = localStorage.getItem('authToken');
      if (!token) return;
      fetch(`${API_URL}/api/user/sessions/${sessionId}/played`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
      });
    }

    function logout() {
      localStorage.removeItem('authToken');
      location.href = '/';
    }


    (async function init() {
      const token = localStorage.getItem('authToken');
      const container = document.getElementById('main-content');

      if (!token) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔒</div>
            <p><a href="login.html">Sign in</a> to view your recording history.</p>
          </div>`;
        return;
      }

      // Load user email for nav
      try {
        const meRes = await fetch(`${API_URL}/api/auth/me`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        if (meRes.ok) {
          const me = await meRes.json();
          document.getElementById('user-email').textContent = me.email || '';
        }
      } catch (_) {}

      // Load sessions
      let res;
      try {
        res = await fetch(`${API_URL}/api/user/sessions`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });
      } catch (_) {
        container.innerHTML = `<div class="error-msg">Connection error. Please check the server.</div>`;
        return;
      }

      if (res.status === 401) {
        localStorage.removeItem('authToken');
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">⏰</div>
            <p>Session expired. <a href="login.html">Sign in again</a>.</p>
          </div>`;
        return;
      }

      if (!res.ok) {
        container.innerHTML = `<div class="error-msg">Failed to load recordings.</div>`;
        return;
      }

      const data = await res.json();
      const sessions = data.sessions || [];

      if (sessions.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🎙️</div>
            <p>You don't have any recordings yet.<br>
            <a href="/app" class="new-session-btn" style="display:inline-block;margin-top:16px">Create your first session</a></p>
          </div>`;
        return;
      }

      container.innerHTML = sessions.map(s => `
        <div class="session-card" id="card-${s.id}">
          <div class="card-summary">
            <div class="session-info">
              <div class="session-topic">${escapeHtml(s.topic)}</div>
              <div class="session-meta">${escapeHtml(s.language)} · ${s.duration_minutes} min</div>
            </div>
            <span class="session-time">${relativeTime(s.created_at)}</span>
            ${s.audio_url ? `
              <button class="play-btn" id="play-${s.id}"
                      onclick="togglePlayer('${s.id}', '${escapeHtml(s.audio_url)}')" title="Play">
                <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg class="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
              </button>
              <a class="download-btn" href="${escapeHtml(s.audio_url)}" target="_blank" title="Download">⬇</a>
            ` : ''}
            <button class="delete-btn" onclick="deleteSession('${s.id}')" title="Delete">🗑</button>
          </div>
          ${s.audio_url ? `
            <div class="player-panel" id="player-${s.id}">
              <audio id="audio-${s.id}" src="${escapeHtml(s.audio_url)}" preload="none"></audio>
              <div class="mini-seek-row">
                <input type="range" class="mini-seek" id="seek-${s.id}"
                       min="0" max="100" value="0" step="0.1"
                       oninput="seekTo('${s.id}')" />
                <span class="mini-time" id="time-${s.id}">0:00 / 0:00</span>
              </div>
              <div class="mini-controls">
                <button class="skip-btn" onclick="skipTime('${s.id}', -5)">⏪ 5s</button>
                <button class="skip-btn" onclick="skipTime('${s.id}', 5)">5s ⏩</button>
              </div>
            </div>
          ` : ''}
        </div>
      `).join('');
    })();

    let currentPlayerId = null;

    function formatTime(s) {
      if (!s || isNaN(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ':' + String(sec).padStart(2, '0');
    }

    function setPlayIcon(sessionId, playing) {
      const btn = document.getElementById('play-' + sessionId);
      if (!btn) return;
      btn.querySelector('.icon-play').style.display = playing ? 'none' : '';
      btn.querySelector('.icon-pause').style.display = playing ? '' : 'none';
    }

    function closePlayer(sessionId) {
      const panel = document.getElementById('player-' + sessionId);
      const audio = document.getElementById('audio-' + sessionId);
      if (!panel) return;
      panel.classList.remove('open');
      if (audio) { audio.pause(); audio.currentTime = 0; }
      setPlayIcon(sessionId, false);
      const seek = document.getElementById('seek-' + sessionId);
      const time = document.getElementById('time-' + sessionId);
      if (seek) seek.value = 0;
      if (time) time.textContent = '0:00 / 0:00';
    }

    function togglePlayer(sessionId, audioUrl) {
      // close previously open player
      if (currentPlayerId && currentPlayerId !== sessionId) {
        closePlayer(currentPlayerId);
        currentPlayerId = null;
      }

      const panel = document.getElementById('player-' + sessionId);
      const audio = document.getElementById('audio-' + sessionId);
      if (!panel || !audio) return;

      if (!panel.classList.contains('open')) {
        // open and start playing
        panel.classList.add('open');
        currentPlayerId = sessionId;
        markPlayed(sessionId);

        // wire events once
        if (!audio.dataset.wired) {
          audio.dataset.wired = '1';
          audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const seek = document.getElementById('seek-' + sessionId);
            const time = document.getElementById('time-' + sessionId);
            if (seek) seek.value = (audio.currentTime / audio.duration) * 100;
            if (time) time.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
          });
          audio.addEventListener('ended', () => {
            audio.currentTime = 0;
            setPlayIcon(sessionId, false);
            const seek = document.getElementById('seek-' + sessionId);
            const time = document.getElementById('time-' + sessionId);
            if (seek) seek.value = 0;
            if (time) time.textContent = '0:00 / ' + formatTime(audio.duration);
            currentPlayerId = null;
          });
        }

        audio.play().then(() => setPlayIcon(sessionId, true)).catch(() => {});
      } else {
        // toggle play/pause
        if (audio.paused) {
          audio.play().then(() => setPlayIcon(sessionId, true)).catch(() => {});
        } else {
          audio.pause();
          setPlayIcon(sessionId, false);
        }
      }
    }

    function skipTime(sessionId, delta) {
      const audio = document.getElementById('audio-' + sessionId);
      if (!audio) return;
      audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + delta));
    }

    function seekTo(sessionId) {
      const audio = document.getElementById('audio-' + sessionId);
      const seek = document.getElementById('seek-' + sessionId);
      if (audio && audio.duration && seek) {
        audio.currentTime = (seek.value / 100) * audio.duration;
      }
    }

    async function deleteSession(sessionId) {
      if (!confirm('Delete this recording? This cannot be undone.')) return;
      const card = document.getElementById(`card-${sessionId}`);
      const token = localStorage.getItem('authToken');

      card.classList.add('deleting');
      try {
        const res = await fetch(`${API_URL}/api/user/sessions/${sessionId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` },
        });
        if (res.ok) {
          card.classList.remove('deleting');
          card.classList.add('deleted');
          card.addEventListener('transitionend', () => card.remove(), { once: true });
        } else {
          card.classList.remove('deleting');
          alert('Failed to delete recording.');
        }
      } catch (_) {
        card.classList.remove('deleting');
        alert('Connection error.');
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
