<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History – LinguaFlow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e40;
      --accent: #6c63ff;
      --accent-hover: #7d75ff;
      --accent-dim: rgba(108, 99, 255, 0.15);
      --text: #e8e8f0;
      --text-muted: #8888a8;
      --success: #4caf88;
      --error: #ef5350;
      --radius: 12px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    nav {
      width: 100%;
      max-width: 520px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    nav .logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.8rem;
    }

    .nav-right .user-email {
      color: var(--text-muted);
    }

    .nav-right button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      font-family: var(--font);
      padding: 5px 10px;
      transition: all 0.15s;
    }

    .nav-right button:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 20px;
      width: 100%;
      max-width: 520px;
    }

    .session-list {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-decoration: none;
      transition: border-color 0.15s;
    }

    .session-card:hover {
      border-color: var(--accent);
    }

    .session-info { flex: 1; min-width: 0; }

    .session-topic {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .session-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .session-time {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .play-btn {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.15s;
    }

    .play-btn:hover { background: rgba(108,99,255,0.3); }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state p { font-size: 0.95rem; line-height: 1.6; }
    .empty-state a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .error-msg {
      background: rgba(239, 83, 80, 0.1);
      border: 1px solid var(--error);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 0.875rem;
      color: var(--error);
      width: 100%;
      max-width: 520px;
      margin-bottom: 16px;
    }

    .spinner-wrap {
      display: flex;
      justify-content: center;
      padding: 48px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .new-session-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .new-session-btn:hover { background: var(--accent-hover); }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="/">LinguaFlow</a>
    <div class="nav-right">
      <span class="user-email" id="user-email"></span>
      <button id="btn-logout">Sign out</button>
    </div>
  </nav>

  <h2>Your recordings</h2>

  <div id="main-content" class="session-list">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>

  <script>
    const API_URL = window.location.origin;

    function relativeTime(isoString) {
      const diff = Math.floor((Date.now() - new Date(isoString).getTime()) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) { const m = Math.floor(diff / 60); return `${m} minute${m > 1 ? 's' : ''} ago`; }
      if (diff < 86400) { const h = Math.floor(diff / 3600); return `${h} hour${h > 1 ? 's' : ''} ago`; }
      if (diff < 604800) { const d = Math.floor(diff / 86400); return `${d} day${d > 1 ? 's' : ''} ago`; }
      return new Date(isoString).toLocaleDateString('pt-BR');
    }

    function markPlayed(sessionId) {
      const token = localStorage.getItem('authToken');
      if (!token) return;
      fetch(`${API_URL}/api/user/sessions/${sessionId}/played`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
      });
    }

    function logout() {
      localStorage.removeItem('authToken');
      location.href = '/';
    }

    document.getElementById('btn-logout').addEventListener('click', logout);

    (async function init() {
      const token = localStorage.getItem('authToken');
      const container = document.getElementById('main-content');

      if (!token) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔒</div>
            <p><a href="login.html">Sign in</a> to view your recording history.</p>
          </div>`;
        return;
      }

      // Load user email for nav
      try {
        const meRes = await fetch(`${API_URL}/api/auth/me`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        if (meRes.ok) {
          const me = await meRes.json();
          document.getElementById('user-email').textContent = me.email || '';
        }
      } catch (_) {}

      // Load sessions
      let res;
      try {
        res = await fetch(`${API_URL}/api/user/sessions`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });
      } catch (_) {
        container.innerHTML = `<div class="error-msg">Connection error. Please check the server.</div>`;
        return;
      }

      if (res.status === 401) {
        localStorage.removeItem('authToken');
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">⏰</div>
            <p>Session expired. <a href="login.html">Sign in again</a>.</p>
          </div>`;
        return;
      }

      if (!res.ok) {
        container.innerHTML = `<div class="error-msg">Failed to load recordings.</div>`;
        return;
      }

      const data = await res.json();
      const sessions = data.sessions || [];

      if (sessions.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🎙️</div>
            <p>You don't have any recordings yet.<br>
            <a href="/app" class="new-session-btn" style="display:inline-block;margin-top:16px">Create your first session</a></p>
          </div>`;
        return;
      }

      container.innerHTML = sessions.map(s => `
        <div class="session-card">
          <div class="session-info">
            <div class="session-topic">${escapeHtml(s.topic)}</div>
            <div class="session-meta">${escapeHtml(s.language)} · ${s.duration_minutes} min</div>
          </div>
          <span class="session-time">${relativeTime(s.created_at)}</span>
          ${s.audio_url
            ? `<a class="play-btn" href="${escapeHtml(s.audio_url)}" target="_blank" title="Ouvir" onclick="markPlayed('${s.id}')">▶</a>`
            : ''}
        </div>
      `).join('');
    })();

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
