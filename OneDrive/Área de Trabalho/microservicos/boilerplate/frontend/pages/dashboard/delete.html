<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delete Account — Dashboard</title>
</head>
<body>
  <h1>Delete Account</h1>
  <p><strong>Warning:</strong> This action is permanent and cannot be undone.
     All your data will be deleted immediately.</p>

  <form id="delete-form">
    <label>
      Type <strong>DELETE</strong> to confirm:
      <input id="confirm-input" type="text" placeholder="DELETE" required>
    </label>
    <button type="submit" id="delete-btn">Permanently Delete My Account</button>
  </form>

  <a href="/dashboard/account">Cancel</a>

  <script type="module">
    import auth from "../../lib/auth.js";
    import api from "../../lib/api.js";
    import toast from "../../components/toast.js";

    await auth.init();
    if (!auth.isAuthenticated()) window.location.href = "/";

    document.getElementById("delete-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const confirmation = document.getElementById("confirm-input").value;

      try {
        document.getElementById("delete-btn").disabled = true;
        await api.delete("/api/user/account", { confirmation });
        auth.logout();
        window.location.href = "/?deleted=1";
      } catch (err) {
        toast.show(err.message, "error");
        document.getElementById("delete-btn").disabled = false;
      }
    });
  </script>
</body>
</html>
